# ============================================================
# Configuration VirtualHost - RECEPTION SALFA
# Serveur WAMP
# ============================================================
# 
# Emplacement: C:\wamp64\conf\extra\reception-salfa.conf
#
# Instructions:
# 1. Copier ce fichier dans le dossier conf/extra/ de WAMP
# 2. Ajouter dans httpd.conf: Include conf/extra/reception-salfa.conf
# 3. Adapter les chemins selon votre installation
# 4. Redémarrer WAMP
# ============================================================

# --- Configuration pour le réseau local ---
<VirtualHost *:80>
    ServerName localhost
    ServerAlias reception-salfa.local
    DocumentRoot "C:/wamp64/www/reception-salfa"
    
    <Directory "C:/wamp64/www/reception-salfa">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Règles pour React Router (SPA)
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteRule ^(.*)$ /index.html [QSA,L]
    </Directory>
    
    ErrorLog "C:/wamp64/logs/reception-salfa-error.log"
    CustomLog "C:/wamp64/logs/reception-salfa-access.log" common
</VirtualHost>

# --- Configuration pour accès réseau (192.168.1.50) ---
<VirtualHost *:80>
    ServerName 192.168.1.50
    ServerAlias reception-salfa
    DocumentRoot "C:/wamp64/www/reception-salfa"
    
    <Directory "C:/wamp64/www/reception-salfa">
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Règles pour React Router (SPA)
        RewriteEngine On
        RewriteBase /
        RewriteRule ^index\.html$ - [L]
        RewriteRule ^(.*)$ /index.html [QSA,L]
    </Directory>
    
    # Headers de sécurité
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    
    ErrorLog "C:/wamp64/logs/reception-salfa-network-error.log"
    CustomLog "C:/wamp64/logs/reception-salfa-network-access.log" common
</VirtualHost>

# ============================================================
# NOTES:
# - Remplacer C:/wamp64 par votre chemin d'installation WAMP
# - Modifier 192.168.1.50 par l'adresse IP réelle de votre serveur
# - Pour HTTPS, ajouter un VirtualHost sur le port 443
# ============================================================
